<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero Sorteo</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h2 {
    margin-top: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(10, 60px);
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 60px;
    height: 60px;
    background-color: #6f9e86;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    color: black;
}

.sold {
    background-color: red;
    color: white;
}
</style>
</head>

<body>

<h2>🎯 TABLERO DE SORTEO</h2>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = num;

    div.onclick = () => {
        div.classList.toggle("sold");
    };

    grid.appendChild(div);
}
</script>

</body>
</html>
