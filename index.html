<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dinámicas D y S</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h1 {
    margin-top: 10px;
}

.panel {
    margin: 10px;
    font-weight: bold;
}

.botones {
    margin: 10px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.reset { background: #ff4d4d; color: white; }
.export { background: #4CAF50; color: white; }

.grid {
    display: grid;
    grid-template-columns: repeat(10, 60px);
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 60px;
    height: 60px;
    background-color: #6f9e86;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.sold {
    background-color: red;
    color: white;
}
</style>
</head>

<body>

<h1>🔥 Dinámicas D y S 🔥</h1>

<div class="panel">💰 Vendidos: <span id="vendidos">0</span></div>
<div class="panel">📊 Disponibles: <span id="disponibles">100</span></div>
<div class="panel">💵 Total: $<span id="total">0</span></div>

<div class="botones">
    <button class="reset" onclick="reiniciar()">🔄 Nuevo sorteo</button>
    <button class="export" onclick="exportar()">📤 Exportar clientes</button>
</div>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

// Cargar datos
let datos = JSON.parse(localStorage.getItem("datos")) || {};

// Actualizar contadores
function actualizarInfo() {
    let vendidos = Object.keys(datos).length;
    document.getElementById("vendidos").innerText = vendidos;
    document.getElementById("disponibles").innerText = 100 - vendidos;
    document.getElementById("total").innerText = vendidos * 5000;
}

// Crear tablero
for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = num;

    if (datos[num]) {
        div.classList.add("sold");
    }

    div.onclick = () => {
        if (datos[num]) {
            alert("⚠️ Este número ya está vendido");
            return;
        }

        let nombre = prompt("Nombre del cliente:");
        if (!nombre) return;

        let telefono = prompt("Número de teléfono:");
        if (!telefono) return;

        datos[num] = { nombre, telefono };

        localStorage.setItem("datos", JSON.stringify(datos));

        div.classList.add("sold");

        actualizarInfo();
